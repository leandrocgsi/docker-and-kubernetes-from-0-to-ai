apiVersion: v1
kind: Service
metadata:
    name: db-published
    namespace: stack-wordpress
spec:
    type: NodePort
    selector:
      com.docker.compose.project: stack-wordpress
      com.docker.compose.service: db
    ports:
      - name: db-3306
        port: 3306
        protocol: TCP
        targetPort: db-3306
        nodePort: 30336