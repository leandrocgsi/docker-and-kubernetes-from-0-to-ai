apiVersion: v1
kind: Service
metadata:
    name: wordpress-published
    namespace: stack-wordpress
spec:
    type: NodePort
    selector:
      com.docker.compose.project: stack-wordpress
      com.docker.compose.service: wordpress
    ports:
      - name: wordpress-80
        port: 80
        protocol: TCP
        targetPort: wordpress-80
        nodePort: 30080